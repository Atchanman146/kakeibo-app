<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シンプル家計簿</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@latest/dist/chart.umd.min.js"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <main class="mx-auto flex min-h-screen w-full max-w-md flex-col px-4 py-6">
    <section class="rounded-lg bg-white p-6 shadow-sm">
      <p class="text-sm font-medium text-slate-500">今月の総支出</p>
      <div class="mt-3">
        <p id="monthlyTotal" class="text-4xl font-bold tracking-normal text-slate-900">¥0</p>
      </div>

      <div class="mt-5 flex justify-center">
        <div class="relative h-40 w-40">
          <canvas id="categoryChart" aria-label="カテゴリ別の支出割合"></canvas>
          <div class="pointer-events-none absolute inset-0 flex flex-col items-center justify-center text-center">
            <p class="text-[11px] font-semibold text-slate-400">総支出</p>
            <p id="chartCenterTotal" class="mt-1 max-w-28 break-words text-lg font-bold leading-tight text-slate-900">¥0</p>
          </div>
        </div>
      </div>
      <div id="categoryLegend" class="mt-4 grid grid-cols-2 gap-2 text-xs"></div>

      <div class="mt-5 grid grid-cols-2 gap-3">
        <div class="rounded-lg bg-emerald-50 p-4">
          <p class="text-xs font-semibold text-emerald-700">今月の残り予算</p>
          <p id="remainingBudget" class="mt-2 text-xl font-bold text-emerald-900">¥0</p>
        </div>
        <div class="rounded-lg bg-blue-50 p-4">
          <p class="text-xs font-semibold text-blue-700">今日使えるお金</p>
          <p id="dailyAvailable" class="mt-2 text-xl font-bold text-blue-900">¥0</p>
        </div>
      </div>
    </section>

    <section class="mt-5 rounded-lg bg-white p-5 shadow-sm">
      <form id="budgetForm" class="mb-5 border-b border-slate-100 pb-5">
        <label for="budget" class="block text-sm font-semibold text-slate-700">今月の予算</label>
        <div class="mt-2 flex gap-2">
          <input
            id="budget"
            type="number"
            inputmode="numeric"
            min="0"
            step="1000"
            class="min-w-0 flex-1 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-base outline-none transition focus:border-emerald-400 focus:bg-white focus:ring-4 focus:ring-emerald-100"
            required
          >
          <button
            type="submit"
            class="shrink-0 rounded-lg bg-emerald-600 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700 active:scale-[0.99]"
          >
            設定
          </button>
        </div>
      </form>

      <form id="expenseForm" class="space-y-4">
        <div>
          <label for="amount" class="block text-sm font-semibold text-slate-700">金額</label>
          <input
            id="amount"
            type="number"
            inputmode="numeric"
            min="1"
            step="1"
            placeholder="例: 1200"
            class="mt-2 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-base outline-none transition focus:border-blue-400 focus:bg-white focus:ring-4 focus:ring-blue-100"
            required
          >
        </div>

        <div>
          <label for="category" class="block text-sm font-semibold text-slate-700">カテゴリ</label>
          <select
            id="category"
            class="mt-2 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-base outline-none transition focus:border-blue-400 focus:bg-white focus:ring-4 focus:ring-blue-100"
          >
            <option value="食費">食費</option>
            <option value="日用品">日用品</option>
            <option value="趣味">趣味</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <button
          type="submit"
          class="w-full rounded-lg bg-blue-600 px-4 py-3 text-base font-semibold text-white shadow-sm transition hover:bg-blue-700 active:scale-[0.99]"
        >
          追加
        </button>
      </form>
    </section>

    <section class="mt-6 flex-1">
      <div class="mb-3 flex items-center justify-between">
        <h1 class="text-lg font-bold text-slate-800">履歴</h1>
        <p id="itemCount" class="text-sm text-slate-500">0件</p>
      </div>

      <div id="emptyState" class="rounded-lg border border-dashed border-slate-300 bg-white/70 p-6 text-center text-sm text-slate-500">
        まだ支出がありません
      </div>

      <ul id="historyList" class="space-y-3"></ul>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'simple-budget-expenses';
    const BUDGET_STORAGE_KEY = 'simple-budget-monthly-budget';
    const DEFAULT_BUDGET = 50000;
    const form = document.getElementById('expenseForm');
    const budgetForm = document.getElementById('budgetForm');
    const amountInput = document.getElementById('amount');
    const categoryInput = document.getElementById('category');
    const budgetInput = document.getElementById('budget');
    const monthlyTotal = document.getElementById('monthlyTotal');
    const chartCenterTotal = document.getElementById('chartCenterTotal');
    const categoryChartCanvas = document.getElementById('categoryChart');
    const categoryLegend = document.getElementById('categoryLegend');
    const remainingBudget = document.getElementById('remainingBudget');
    const dailyAvailable = document.getElementById('dailyAvailable');
    const historyList = document.getElementById('historyList');
    const emptyState = document.getElementById('emptyState');
    const itemCount = document.getElementById('itemCount');
    const categories = ['食費', '日用品', '趣味', 'その他'];
    const chartColors = ['#60a5fa', '#34d399', '#fbbf24', '#a78bfa'];
    const emptyChartColors = ['#e2e8f0', '#e2e8f0', '#e2e8f0', '#e2e8f0'];

    let expenses = loadExpenses();
    let monthlyBudget = loadBudget();
    let categoryChart;

    function loadExpenses() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveExpenses() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
    }

    function loadBudget() {
      const savedBudget = Number(localStorage.getItem(BUDGET_STORAGE_KEY));
      return Number.isFinite(savedBudget) && savedBudget >= 0 ? savedBudget : DEFAULT_BUDGET;
    }

    function saveBudget() {
      localStorage.setItem(BUDGET_STORAGE_KEY, String(monthlyBudget));
    }

    function formatYen(value) {
      return new Intl.NumberFormat('ja-JP', {
        style: 'currency',
        currency: 'JPY',
        maximumFractionDigits: 0
      }).format(value);
    }

    function formatDate(isoDate) {
      return new Intl.DateTimeFormat('ja-JP', {
        month: 'numeric',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date(isoDate));
    }

    function isCurrentMonth(isoDate) {
      const date = new Date(isoDate);
      const now = new Date();
      return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
    }

    function getRemainingDaysInMonth() {
      const now = new Date();
      const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      return lastDay - now.getDate() + 1;
    }

    function getCurrentMonthExpenses() {
      return expenses.filter((expense) => isCurrentMonth(expense.createdAt));
    }

    function getCategoryTotals(currentMonthExpenses) {
      return categories.map((category) => {
        return currentMonthExpenses
          .filter((expense) => expense.category === category)
          .reduce((sum, expense) => sum + expense.amount, 0);
      });
    }

    function updateCategoryChart(categoryTotals, total) {
      if (!window.Chart) return;

      const chartData = total > 0 ? categoryTotals : [1, 0, 0, 0];
      const colors = total > 0 ? chartColors : emptyChartColors;

      if (!categoryChart) {
        categoryChart = new Chart(categoryChartCanvas, {
          type: 'doughnut',
          data: {
            labels: categories,
            datasets: [{
              data: chartData,
              backgroundColor: colors,
              borderColor: '#ffffff',
              borderWidth: 4,
              hoverOffset: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '70%',
            plugins: {
              legend: {
                display: false
              },
              tooltip: {
                enabled: total > 0,
                callbacks: {
                  label: (context) => `${context.label}: ${formatYen(context.raw)}`
                }
              }
            }
          }
        });
        return;
      }

      categoryChart.data.datasets[0].data = chartData;
      categoryChart.data.datasets[0].backgroundColor = colors;
      categoryChart.options.plugins.tooltip.enabled = total > 0;
      categoryChart.update();
    }

    function updateCategoryLegend(categoryTotals, total) {
      categoryLegend.innerHTML = '';

      categories.forEach((category, index) => {
        const amount = categoryTotals[index];
        const percent = total > 0 ? Math.round((amount / total) * 100) : 0;
        const item = document.createElement('div');
        item.className = 'flex items-center justify-between gap-2 rounded-lg bg-slate-50 px-3 py-2';
        item.innerHTML = `
          <span class="flex min-w-0 items-center gap-2 text-slate-600">
            <span class="h-2.5 w-2.5 shrink-0 rounded-full" style="background-color: ${chartColors[index]}"></span>
            <span class="truncate">${category}</span>
          </span>
          <span class="shrink-0 font-semibold text-slate-800">${percent}%</span>
        `;
        categoryLegend.appendChild(item);
      });
    }

    function render() {
      const currentMonthExpenses = getCurrentMonthExpenses();
      const total = currentMonthExpenses.reduce((sum, expense) => sum + expense.amount, 0);
      const categoryTotals = getCategoryTotals(currentMonthExpenses);
      const remaining = monthlyBudget - total;
      const dailyAmount = Math.floor(remaining / getRemainingDaysInMonth());

      monthlyTotal.textContent = formatYen(total);
      chartCenterTotal.textContent = formatYen(total);
      remainingBudget.textContent = formatYen(remaining);
      dailyAvailable.textContent = formatYen(dailyAmount);
      updateCategoryChart(categoryTotals, total);
      updateCategoryLegend(categoryTotals, total);
      budgetInput.value = monthlyBudget;
      itemCount.textContent = `${expenses.length}件`;
      emptyState.classList.toggle('hidden', expenses.length > 0);
      historyList.innerHTML = '';

      expenses
        .slice()
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .forEach((expense) => {
          const item = document.createElement('li');
          item.className = 'flex items-center justify-between gap-3 rounded-lg bg-white p-4 shadow-sm';
          item.innerHTML = `
            <div class="min-w-0">
              <div class="flex items-center gap-2">
                <span class="rounded-full bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700">${expense.category}</span>
                <span class="text-xs text-slate-400">${formatDate(expense.createdAt)}</span>
              </div>
              <p class="mt-2 text-xl font-bold text-slate-900">${formatYen(expense.amount)}</p>
            </div>
            <button
              type="button"
              class="shrink-0 rounded-lg bg-slate-100 px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-rose-50 hover:text-rose-600"
              data-id="${expense.id}"
            >
              削除
            </button>
          `;
          historyList.appendChild(item);
        });
    }

    budgetForm.addEventListener('submit', (event) => {
      event.preventDefault();

      const budget = Number(budgetInput.value);
      if (!Number.isFinite(budget) || budget < 0) {
        budgetInput.focus();
        return;
      }

      monthlyBudget = Math.round(budget);
      saveBudget();
      render();
    });

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const amount = Number(amountInput.value);
      if (!Number.isFinite(amount) || amount <= 0) {
        amountInput.focus();
        return;
      }

      expenses.push({
        id: crypto.randomUUID(),
        amount: Math.round(amount),
        category: categoryInput.value,
        createdAt: new Date().toISOString()
      });

      saveExpenses();
      render();
      form.reset();
      categoryInput.value = '食費';
      amountInput.focus();
    });

    historyList.addEventListener('click', (event) => {
      const deleteButton = event.target.closest('button[data-id]');
      if (!deleteButton) return;

      expenses = expenses.filter((expense) => expense.id !== deleteButton.dataset.id);
      saveExpenses();
      render();
    });

    render();
  </script>
</body>
</html>
