<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>シンプル家計簿</title>
  <link rel="apple-touch-icon" href="icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@latest/dist/chart.umd.min.js" defer></script>
  <style>
    #splashScreen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #a3e6d2 0%, #76d7c4 100%);
      opacity: 1;
      transition: opacity 500ms ease, visibility 500ms ease;
    }

    #splashScreen.splash-hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 132px;
      height: 132px;
      border-radius: 32px;
      box-shadow: 0 24px 60px rgba(15, 118, 110, 0.22);
      opacity: 0;
      transform: scale(0.9);
      animation: splashLogoIn 700ms ease forwards;
    }

    @keyframes splashLogoIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    input[type="date"] {
      display: block;
      width: 100%;
      max-width: 100%;
      min-height: 52px;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="date"]::-webkit-date-and-time-value {
      text-align: left;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      margin-left: auto;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <div id="splashScreen" aria-hidden="true">
    <img src="icon.png" alt="" class="splash-logo">
  </div>

  <main class="mx-auto flex min-h-screen w-full max-w-md flex-col px-4 py-6">
    <header class="mb-5 rounded-lg bg-gradient-to-r from-emerald-100 to-teal-100 px-5 py-4 shadow-sm">
      <p class="text-xs font-semibold uppercase tracking-[0.16em] text-emerald-700">Today</p>
      <p id="todayLabel" class="mt-1 text-2xl font-bold tracking-normal text-slate-900">Saturday, Jul 4</p>
    </header>

    <section class="rounded-lg bg-white p-6 shadow-sm">
      <p class="text-sm font-medium text-slate-500">今月の総支出</p>
      <div class="mt-3">
        <p id="monthlyTotal" class="text-4xl font-bold tracking-normal text-slate-900">¥0</p>
      </div>

      <div class="mt-5 flex justify-center">
        <div class="relative h-40 w-40">
          <canvas id="categoryChart" aria-label="カテゴリ別の支出割合"></canvas>
          <div class="pointer-events-none absolute inset-0 flex flex-col items-center justify-center text-center">
            <p class="text-[11px] font-semibold text-slate-400">総支出</p>
            <p id="chartCenterTotal" class="mt-1 max-w-28 break-words text-lg font-bold leading-tight text-slate-900">¥0</p>
          </div>
        </div>
      </div>
      <div id="categoryLegend" class="mt-4 grid grid-cols-2 gap-2 text-xs"></div>

      <div class="mt-5 grid grid-cols-2 gap-3">
        <div class="rounded-lg bg-emerald-50 p-4">
          <p class="text-xs font-semibold text-emerald-700">今月の残り予算</p>
          <p id="remainingBudget" class="mt-2 text-xl font-bold text-emerald-900">¥0</p>
        </div>
        <div class="rounded-lg bg-blue-50 p-4">
          <p class="text-xs font-semibold text-blue-700">今日使えるお金</p>
          <p id="dailyAvailable" class="mt-2 text-xl font-bold text-blue-900">¥0</p>
        </div>
      </div>
    </section>

    <section class="mt-5 rounded-lg bg-white p-5 shadow-sm">
      <form id="expenseForm" class="space-y-4 border-b border-slate-100 pb-5">
        <div>
          <label for="expenseDate" class="block text-sm font-semibold text-slate-700">日付</label>
          <input
            id="expenseDate"
            type="date"
            class="mt-2 block w-full max-w-full rounded-lg border border-emerald-100 bg-emerald-50/70 px-4 py-3 text-left text-base font-medium text-slate-700 outline-none transition focus:border-emerald-400 focus:bg-white focus:ring-4 focus:ring-emerald-100"
            required
          >
        </div>

        <div>
          <label for="amount" class="block text-sm font-semibold text-slate-700">金額</label>
          <input
            id="amount"
            type="number"
            inputmode="numeric"
            min="1"
            step="1"
            placeholder="例: 1200"
            class="mt-2 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-base outline-none transition focus:border-blue-400 focus:bg-white focus:ring-4 focus:ring-blue-100"
            required
          >
        </div>

        <div>
          <label for="category" class="block text-sm font-semibold text-slate-700">カテゴリ</label>
          <select
            id="category"
            class="mt-2 w-full rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-base outline-none transition focus:border-blue-400 focus:bg-white focus:ring-4 focus:ring-blue-100"
          >
            <option value="食費">食費</option>
            <option value="日用品">日用品</option>
            <option value="趣味">趣味</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <button
          type="submit"
          class="w-full rounded-lg bg-blue-600 px-4 py-3 text-base font-semibold text-white shadow-sm transition hover:bg-blue-700 active:scale-[0.99]"
        >
          追加
        </button>
      </form>

      <form id="budgetForm" class="mt-5">
        <label for="budget" class="block text-sm font-semibold text-slate-700">今月の予算</label>
        <div class="mt-2 flex gap-2">
          <input
            id="budget"
            type="number"
            inputmode="numeric"
            min="0"
            step="1000"
            class="min-w-0 flex-1 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-base outline-none transition focus:border-emerald-400 focus:bg-white focus:ring-4 focus:ring-emerald-100"
            required
          >
          <button
            type="submit"
            class="shrink-0 rounded-lg bg-emerald-600 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700 active:scale-[0.99]"
          >
            設定
          </button>
        </div>
      </form>
    </section>

    <section class="mt-6 flex-1">
      <div class="mb-3 flex items-center justify-between">
        <h1 class="text-lg font-bold text-slate-800">履歴</h1>
        <p id="itemCount" class="text-sm text-slate-500">0件</p>
      </div>

      <div id="emptyState" class="rounded-lg border border-dashed border-slate-300 bg-white/70 p-6 text-center text-sm text-slate-500">
        まだ支出がありません
      </div>

      <ul id="historyList" class="space-y-3"></ul>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'simple-budget-expenses';
    const BUDGET_STORAGE_KEY = 'simple-budget-monthly-budget';
    const DEFAULT_BUDGET = 50000;
    const form = document.getElementById('expenseForm');
    const budgetForm = document.getElementById('budgetForm');
    const todayLabel = document.getElementById('todayLabel');
    const expenseDateInput = document.getElementById('expenseDate');
    const amountInput = document.getElementById('amount');
    const categoryInput = document.getElementById('category');
    const budgetInput = document.getElementById('budget');
    const monthlyTotal = document.getElementById('monthlyTotal');
    const chartCenterTotal = document.getElementById('chartCenterTotal');
    const categoryChartCanvas = document.getElementById('categoryChart');
    const categoryLegend = document.getElementById('categoryLegend');
    const remainingBudget = document.getElementById('remainingBudget');
    const dailyAvailable = document.getElementById('dailyAvailable');
    const historyList = document.getElementById('historyList');
    const emptyState = document.getElementById('emptyState');
    const itemCount = document.getElementById('itemCount');
    const splashScreen = document.getElementById('splashScreen');
    const categories = ['食費', '日用品', '趣味', 'その他'];
    const chartColors = ['#60a5fa', '#34d399', '#fbbf24', '#a78bfa'];
    const emptyChartColors = ['#e2e8f0', '#e2e8f0', '#e2e8f0', '#e2e8f0'];

    let expenses = loadExpenses();
    let monthlyBudget = loadBudget();
    let categoryChart;

    function loadExpenses() {
      try {
        const savedExpenses = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        if (!Array.isArray(savedExpenses)) return [];

        return savedExpenses
          .map(normalizeExpense)
          .filter(Boolean);
      } catch {
        return [];
      }
    }

    function normalizeExpense(expense) {
      if (!expense || typeof expense !== 'object') return null;

      const amount = Number(expense.amount);
      const category = categories.includes(expense.category) ? expense.category : 'その他';
      const createdAt = Number.isNaN(new Date(expense.createdAt).getTime())
        ? new Date().toISOString()
        : expense.createdAt;
      const expenseDate = isValidDateInput(expense.expenseDate)
        ? expense.expenseDate
        : toDateInputValue(new Date(createdAt));

      if (!Number.isFinite(amount) || amount <= 0) return null;

      return {
        id: typeof expense.id === 'string' && expense.id ? expense.id : createId(),
        amount: Math.round(amount),
        category,
        expenseDate,
        createdAt
      };
    }

    function saveExpenses() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
    }

    function createId() {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return window.crypto.randomUUID();
      }

      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function toDateInputValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function parseLocalDate(dateValue) {
      if (!dateValue) return new Date();

      const [year, month, day] = dateValue.split('-').map(Number);
      if (!year || !month || !day) return new Date(dateValue);

      return new Date(year, month - 1, day);
    }

    function isValidDateInput(dateValue) {
      if (typeof dateValue !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(dateValue)) {
        return false;
      }

      const [year, month, day] = dateValue.split('-').map(Number);
      const date = new Date(year, month - 1, day);
      return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day;
    }

    function getExpenseDateValue(expense) {
      return expense.expenseDate || toDateInputValue(new Date(expense.createdAt));
    }

    function getExpenseTimestamp(expense) {
      const date = parseLocalDate(getExpenseDateValue(expense));
      date.setHours(23, 59, 59, 999);
      return date.getTime();
    }

    function loadBudget() {
      const savedBudget = Number(localStorage.getItem(BUDGET_STORAGE_KEY));
      return Number.isFinite(savedBudget) && savedBudget >= 0 ? savedBudget : DEFAULT_BUDGET;
    }

    function saveBudget() {
      localStorage.setItem(BUDGET_STORAGE_KEY, String(monthlyBudget));
    }

    function formatYen(value) {
      return new Intl.NumberFormat('ja-JP', {
        style: 'currency',
        currency: 'JPY',
        maximumFractionDigits: 0
      }).format(value);
    }

    function formatToday(date) {
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日（${weekdays[date.getDay()]}）`;
    }

    function formatExpenseDate(dateValue) {
      const date = parseLocalDate(dateValue);
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getMonth() + 1}月${date.getDate()}日（${weekdays[date.getDay()]}）`;
    }

    function updateTodayLabel() {
      todayLabel.textContent = formatToday(new Date());
    }

    function isCurrentMonth(expense) {
      const date = parseLocalDate(getExpenseDateValue(expense));
      const now = new Date();
      return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
    }

    function getRemainingDaysInMonth() {
      const now = new Date();
      const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      return lastDay - now.getDate() + 1;
    }

    function getCurrentMonthExpenses() {
      return expenses.filter((expense) => isCurrentMonth(expense));
    }

    function getCategoryTotals(currentMonthExpenses) {
      return categories.map((category) => {
        return currentMonthExpenses
          .filter((expense) => expense.category === category)
          .reduce((sum, expense) => sum + expense.amount, 0);
      });
    }

    function updateCategoryChart(categoryTotals, total) {
      if (!window.Chart) return;

      const chartData = total > 0 ? categoryTotals : [1, 0, 0, 0];
      const colors = total > 0 ? chartColors : emptyChartColors;

      if (!categoryChart) {
        categoryChart = new Chart(categoryChartCanvas, {
          type: 'doughnut',
          data: {
            labels: categories,
            datasets: [{
              data: chartData,
              backgroundColor: colors,
              borderColor: '#ffffff',
              borderWidth: 4,
              hoverOffset: 4
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '70%',
            plugins: {
              legend: {
                display: false
              },
              tooltip: {
                enabled: total > 0,
                callbacks: {
                  label: (context) => `${context.label}: ${formatYen(context.raw)}`
                }
              }
            }
          }
        });
        return;
      }

      categoryChart.data.datasets[0].data = chartData;
      categoryChart.data.datasets[0].backgroundColor = colors;
      categoryChart.options.plugins.tooltip.enabled = total > 0;
      categoryChart.update();
    }

    function updateCategoryLegend(categoryTotals, total) {
      categoryLegend.innerHTML = '';

      categories.forEach((category, index) => {
        const amount = categoryTotals[index];
        const percent = total > 0 ? Math.round((amount / total) * 100) : 0;
        const item = document.createElement('div');
        item.className = 'flex items-center justify-between gap-2 rounded-lg bg-slate-50 px-3 py-2';

        const label = document.createElement('span');
        label.className = 'flex min-w-0 items-center gap-2 text-slate-600';

        const swatch = document.createElement('span');
        swatch.className = 'h-2.5 w-2.5 shrink-0 rounded-full';
        swatch.style.backgroundColor = chartColors[index];

        const categoryName = document.createElement('span');
        categoryName.className = 'truncate';
        categoryName.textContent = category;

        const percentage = document.createElement('span');
        percentage.className = 'shrink-0 font-semibold text-slate-800';
        percentage.textContent = `${percent}%`;

        label.append(swatch, categoryName);
        item.append(label, percentage);
        categoryLegend.appendChild(item);
      });
    }

    function createHistoryItem(expense) {
      const item = document.createElement('li');
      item.className = 'flex items-center justify-between gap-3 rounded-lg bg-white p-4 shadow-sm';

      const detail = document.createElement('div');
      detail.className = 'min-w-0';

      const meta = document.createElement('div');
      meta.className = 'flex items-center gap-2';

      const category = document.createElement('span');
      category.className = 'rounded-full bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700';
      category.textContent = expense.category;

      const date = document.createElement('span');
      date.className = 'text-xs text-slate-400';
      date.textContent = formatExpenseDate(getExpenseDateValue(expense));

      const amount = document.createElement('p');
      amount.className = 'mt-2 text-xl font-bold text-slate-900';
      amount.textContent = formatYen(expense.amount);

      const deleteButton = document.createElement('button');
      deleteButton.type = 'button';
      deleteButton.className = 'shrink-0 rounded-lg bg-slate-100 px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-rose-50 hover:text-rose-600';
      deleteButton.dataset.id = expense.id;
      deleteButton.textContent = '削除';

      meta.append(category, date);
      detail.append(meta, amount);
      item.append(detail, deleteButton);

      return item;
    }

    function render() {
      const currentMonthExpenses = getCurrentMonthExpenses();
      const total = currentMonthExpenses.reduce((sum, expense) => sum + expense.amount, 0);
      const categoryTotals = getCategoryTotals(currentMonthExpenses);
      const remaining = monthlyBudget - total;
      const dailyAmount = Math.floor(remaining / getRemainingDaysInMonth());

      monthlyTotal.textContent = formatYen(total);
      chartCenterTotal.textContent = formatYen(total);
      remainingBudget.textContent = formatYen(remaining);
      dailyAvailable.textContent = remaining < 0 ? '予算オーバー' : formatYen(dailyAmount);
      remainingBudget.classList.toggle('text-rose-600', remaining < 0);
      remainingBudget.classList.toggle('text-emerald-900', remaining >= 0);
      updateCategoryChart(categoryTotals, total);
      updateCategoryLegend(categoryTotals, total);
      budgetInput.value = monthlyBudget;
      itemCount.textContent = `${expenses.length}件`;
      emptyState.classList.toggle('hidden', expenses.length > 0);
      historyList.innerHTML = '';

      expenses
        .slice()
        .sort((a, b) => {
          const dateDiff = getExpenseTimestamp(b) - getExpenseTimestamp(a);
          if (dateDiff !== 0) return dateDiff;

          return new Date(b.createdAt) - new Date(a.createdAt);
        })
        .forEach((expense) => {
          historyList.appendChild(createHistoryItem(expense));
        });
    }

    budgetForm.addEventListener('submit', (event) => {
      event.preventDefault();

      const budget = Number(budgetInput.value);
      if (!Number.isFinite(budget) || budget < 0) {
        budgetInput.focus();
        return;
      }

      monthlyBudget = Math.round(budget);
      saveBudget();
      render();
    });

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const amount = Number(amountInput.value);
      if (!Number.isFinite(amount) || amount <= 0) {
        amountInput.focus();
        return;
      }

      if (!isValidDateInput(expenseDateInput.value)) {
        expenseDateInput.focus();
        return;
      }

      const category = categories.includes(categoryInput.value) ? categoryInput.value : 'その他';

      expenses.push({
        id: createId(),
        amount: Math.round(amount),
        category,
        expenseDate: expenseDateInput.value,
        createdAt: new Date().toISOString()
      });

      saveExpenses();
      render();
      form.reset();
      categoryInput.value = '食費';
      expenseDateInput.value = toDateInputValue(new Date());
      amountInput.focus();
    });

    historyList.addEventListener('click', (event) => {
      const deleteButton = event.target.closest('button[data-id]');
      if (!deleteButton) return;

      const shouldDelete = window.confirm('この支出を削除しますか？');
      if (!shouldDelete) return;

      expenses = expenses.filter((expense) => expense.id !== deleteButton.dataset.id);
      saveExpenses();
      render();
    });

    window.addEventListener('load', () => {
      updateTodayLabel();
      expenseDateInput.value = toDateInputValue(new Date());
      render();
      window.setInterval(updateTodayLabel, 60000);

      window.setTimeout(() => {
        splashScreen.classList.add('splash-hidden');
      }, 1000);
    });
  </script>
</body>
</html>
